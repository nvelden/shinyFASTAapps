<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>shinyFASTA</title>
  <style>
    :root {
      --bg: #eef7ff;
      --ink: #07111f;
      --muted: #6e757b;
      --blue: #0099f9;
      --blue-dark: #0868d8;
      --blue-soft: #e6f3ff;
      --card: #ffffff;
      --line: rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { background: var(--bg); margin: 0; }

    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: Inter, Arial, "Helvetica Neue", Helvetica, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    .navbar {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .brand-mark { width: 22px; height: 22px; }

    .crumbs {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }
    .crumbs a:hover { color: var(--blue-dark); }
    .crumbs .sep { opacity: 0.5; }
    .crumbs .current { color: var(--ink); font-weight: 600; }

    .nav-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      transition: all 140ms ease;
    }
    .btn:hover { border-color: var(--blue); color: var(--blue-dark); }
    .btn.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .btn.primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); color: #fff; }
    .btn svg { width: 14px; height: 14px; }

    .tool-head {
      max-width: 1040px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 24px 14px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
    }
    .tool-head h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .tool-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 15px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--blue-soft);
      color: var(--blue-dark);
      border: 1px solid rgba(0, 153, 249, 0.25);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--blue);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }

    .frame-wrap {
      flex: 1;
      max-width: 1040px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 28px;
      display: flex;
    }
    .frame-card {
      flex: 1;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(8, 104, 216, 0.08);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 640px;
    }

    .frame-iframe-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #fff;
      pointer-events: none;
      transition: opacity 320ms ease;
    }
    .loading.hidden { opacity: 0; }
    .loader {
      width: 220px;
      height: 4px;
      background: var(--blue-soft);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .loader::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 35%;
      background: var(--blue);
      animation: slide 1.4s ease-in-out infinite;
      border-radius: 2px;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(285%); }
    }
    .loading-text {
      color: var(--ink);
      font-weight: 600;
      font-size: 15px;
    }
    .loading-detail {
      color: var(--muted);
      font-size: 13px;
      max-width: 320px;
      text-align: center;
    }

    footer {
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 720px) {
      .nav-inner { padding: 12px 18px; flex-wrap: wrap; }
      .tool-head { padding: 18px; flex-direction: column; align-items: flex-start; gap: 10px; }
      .frame-wrap { padding: 0 18px 18px; }
      .nav-actions .btn span { display: none; }
      .crumbs { font-size: 14px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-inner">
      <a class="brand" href="./" aria-label="shinyFASTA home">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M5 4l10 12L5 28h7l10-12L12 4H5z" fill="#0099f9"/>
          <path d="M17 4l10 12-10 12h7l8-10.2v-3.6L24 4h-7z" fill="#0868d8"/>
        </svg>
        <span>shinyFASTA</span>
      </a>
      <nav class="crumbs" aria-label="Breadcrumb">
        <a href="./">Home</a>
        <span class="sep">/</span>
        <span class="current" id="crumb">App</span>
      </nav>
      <div class="nav-actions">
        <button class="btn" id="reload" type="button" title="Reload">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 8a6 6 0 1 1-1.76-4.24"/><path d="M14 2v4h-4"/></svg>
          <span>Reload</span>
        </button>
        <a class="btn primary" id="open-new" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2h5v5"/><path d="M14 2L7 9"/><path d="M13 9v4a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h4"/></svg>
          <span>Open in new tab</span>
        </a>
      </div>
    </div>
  </header>

  <div class="tool-head">
    <div>
      <h1 id="title">App</h1>
      <p id="subtitle">Browser-based FASTA tool</p>
    </div>
    <span class="status"><span class="dot"></span><span id="status-label">Loading runtime...</span></span>
  </div>

  <main class="frame-wrap">
    <div class="frame-card">
      <div class="frame-iframe-wrap">
        <iframe id="app-frame" title="FASTA tool" sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-popups"></iframe>
        <div class="loading" id="loading">
          <div class="loading-text">Booting Shinylive runtime...</div>
          <div class="loader"></div>
          <div class="loading-detail">First visits can take 1-2 minutes while runtime assets cache. Subsequent loads are faster.</div>
        </div>
      </div>
    </div>
  </main>

  <footer>&copy; 2022-2026 Niels van der Velden &middot; powered by Shinylive</footer>

  <script>
    const APPS = {
      merge_FASTA:  { title: "Merge",       subtitle: "Combine two or more FASTA files",     path: "./merge_FASTA/" },
      FASTAtoCSV:   { title: "FASTA -> .CSV", subtitle: "Convert FASTA to .CSV file",           path: "./FASTAtoCSV/" },
      filterFASTA:  { title: "Filter",      subtitle: "Use properties to filter FASTA files", path: "./filterFASTA/" },
      paramFASTA:   { title: "Parameters",  subtitle: "Calculate sequence parameters",        path: "./paramFASTA/" },
    };

    const params = new URLSearchParams(location.search);
    const key = APPS[params.get("app")] ? params.get("app") : "merge_FASTA";
    const app = APPS[key];

    document.getElementById("title").textContent = app.title;
    document.getElementById("subtitle").textContent = app.subtitle;
    document.getElementById("crumb").textContent = app.title;
    document.getElementById("open-new").setAttribute("href", app.path);
    document.title = "shinyFASTA  -  " + app.title;

    const iframe = document.getElementById("app-frame");
    const loading = document.getElementById("loading");
    const statusLabel = document.getElementById("status-label");

    function load() {
      loading.classList.remove("hidden");
      statusLabel.textContent = "Loading runtime...";
      iframe.src = app.path;
    }
    iframe.addEventListener("load", () => {
      loading.classList.add("hidden");
      statusLabel.textContent = "Online";
    });
    load();

    document.getElementById("reload").addEventListener("click", () => {
      iframe.src = "about:blank";
      requestAnimationFrame(load);
    });
  </script>
</body>
</html>
