<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>shinyFASTA</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"%3E%3Crect width="32" height="32" rx="7" fill="%23eef7ff"/%3E%3Cpath d="M5 4l10 12L5 28h7l10-12L12 4H5z" fill="%230099f9"/%3E%3Cpath d="M17 4l10 12-10 12h7l8-10.2v-3.6L24 4h-7z" fill="%230868d8"/%3E%3C/svg%3E'>
  <style>
    :root {
      --bg: #eef7ff;
      --ink: #07111f;
      --muted: #6e757b;
      --blue: #0099f9;
      --blue-dark: #0868d8;
      --blue-soft: #e6f3ff;
      --card: #ffffff;
      --line: rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    html,
    body {
      min-height: 100%;
      background: #fff;
      margin: 0;
    }

    body {
      min-height: 100dvh;
      padding-bottom: 52px;
      color: var(--ink);
      font-family: Inter, Arial, "Helvetica Neue", Helvetica, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; text-decoration: none; }

    .navbar {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .nav-inner {
      width: 100%;
      max-width: 1040px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .brand-mark { width: 22px; height: 22px; }

    .crumbs {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
    }
    .crumbs a:hover { color: var(--blue-dark); }
    .crumbs .sep { opacity: 0.5; }
    .crumbs .current { color: var(--ink); font-weight: 600; }

    .tool-head {
      max-width: 1040px;
      width: 100%;
      margin: 0 auto;
      padding: 22px 24px 14px;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      background: var(--bg);
      box-shadow: 0 0 0 100vmax var(--bg);
      clip-path: inset(0 -100vmax);
    }
    .tool-head h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .tool-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .frame-wrap {
      flex: 1;
      max-width: 1040px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 28px;
      display: flex;
      background: var(--bg);
      box-shadow: 0 0 0 100vmax var(--bg);
      clip-path: inset(0 -100vmax);
    }
    .frame-card {
      flex: 1;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 640px;
    }

    .frame-iframe-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: var(--bg);
    }

    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #fff;
      pointer-events: none;
      transition: opacity 320ms ease;
    }
    .loading.hidden { opacity: 0; }
    .loader {
      width: 220px;
      height: 4px;
      background: var(--blue-soft);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }
    .loader::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 35%;
      background: var(--blue);
      animation: slide 1.4s ease-in-out infinite;
      border-radius: 2px;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(285%); }
    }
    .loading-text {
      color: var(--ink);
      font-weight: 600;
      font-size: 15px;
    }
    .loading-detail {
      color: var(--muted);
      font-size: 13px;
      max-width: 320px;
      text-align: center;
    }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding: 16px 24px;
      background: #fff;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    @media (max-width: 720px) {
      .nav-inner { padding: 12px 18px; flex-wrap: wrap; }
      .tool-head { padding: 18px; flex-direction: column; align-items: flex-start; gap: 10px; }
      .frame-wrap { padding: 0 18px 18px; }
      .crumbs { font-size: 14px; }
    }
  </style>
</head>
<body>

  <header class="navbar">
    <div class="nav-inner">
      <a class="brand" href="./" aria-label="shinyFASTA home">
        <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M5 4l10 12L5 28h7l10-12L12 4H5z" fill="#0099f9"/>
          <path d="M17 4l10 12-10 12h7l8-10.2v-3.6L24 4h-7z" fill="#0868d8"/>
        </svg>
        <span>shinyFASTA</span>
      </a>
      <nav class="crumbs" aria-label="Breadcrumb">
        <a href="./">Home</a>
        <span class="sep">/</span>
        <span class="current" id="crumb">App</span>
      </nav>
    </div>
  </header>

  <div class="tool-head">
    <div>
      <h1 id="title">App</h1>
      <p id="subtitle">Browser-based FASTA tool</p>
    </div>
  </div>

  <main class="frame-wrap">
    <div class="frame-card">
      <div class="frame-iframe-wrap">
        <iframe id="app-frame" title="FASTA tool" sandbox="allow-scripts allow-same-origin allow-forms allow-downloads allow-popups"></iframe>
        <div class="loading" id="loading">
          <div class="loading-text">Booting Shinylive runtime...</div>
          <div class="loader"></div>
          <div class="loading-detail">First visits can take 1-2 minutes while runtime assets cache. Subsequent loads are faster.</div>
        </div>
      </div>
    </div>
  </main>

  <footer>&copy; 2022-2026 Niels van der Velden</footer>

  <script>
    const APPS = {
      merge_FASTA:  { title: "Merge",       subtitle: "Combine two or more FASTA files",     path: "./merge_FASTA/" },
      FASTAtoCSV:   { title: "FASTA -> .CSV", subtitle: "Convert FASTA to .CSV file",           path: "./FASTAtoCSV/" },
      filterFASTA:  { title: "Filter",      subtitle: "Use properties to filter FASTA files", path: "./filterFASTA/" },
      paramFASTA:   { title: "Parameters",  subtitle: "Calculate sequence parameters",        path: "./paramFASTA/" },
    };

    const params = new URLSearchParams(location.search);
    const key = APPS[params.get("app")] ? params.get("app") : "merge_FASTA";
    const app = APPS[key];

    document.getElementById("title").textContent = app.title;
    document.getElementById("subtitle").textContent = app.subtitle;
    document.getElementById("crumb").textContent = app.title;
    document.title = "shinyFASTA  -  " + app.title;

    const iframe = document.getElementById("app-frame");
    const loading = document.getElementById("loading");

    function load() {
      loading.classList.remove("hidden");
      iframe.src = app.path;
    }
    iframe.addEventListener("load", () => {
      loading.classList.add("hidden");
    });
    load();
  </script>
</body>
</html>
