name: Deploy Shinylive applications

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install Shinylive
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shinylive

      - name: Export Shinylive apps
        shell: Rscript {0}
        run: |
          apps <- c("merge_FASTA", "FASTAtoCSV", "filterFASTA", "paramFASTA")
          unlink("docs", recursive = TRUE, force = TRUE)
          dir.create("docs")

          for (app in apps) {
            stage <- file.path(".shinylive-export", app)
            unlink(stage, recursive = TRUE, force = TRUE)
            dir.create(stage, recursive = TRUE)
            file.copy(file.path(app, "app.R"), stage)
            file.copy(file.path(app, "R"), stage, recursive = TRUE)
            if (dir.exists(file.path(app, "www"))) {
              file.copy(file.path(app, "www"), stage, recursive = TRUE)
            }
            shinylive::export(stage, file.path("docs", app))
          }

      - name: Add app index
        run: cp dashboard/index.html docs/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload website artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
